<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dad's Morning Workout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <main class="exercise-card">
            <header>
                <h2 id="ex-name">Cat-Cow</h2>
                <p class="rep-count" id="ex-reps">5 Repetitions</p>
            </header>

            <div class="visual-area">
                <img id="ex-media" src="http://googleusercontent.com/image_collection/image_retrieval/4450596152335462724_0" alt="Workout Animation">
            </div>

            <div class="instruction-box">
                <p id="ex-cue">Move with your breath. Don't force the range of motion.</p>
            </div>
        </main>

        <footer>
            <button class="next-btn" onclick="nextExercise()">NEXT EXERCISE</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
